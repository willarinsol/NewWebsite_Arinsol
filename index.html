<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will Diether Arinsol | Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="top-nav">
      <button class="nav-btn" id="homeBtn">Home</button>
      <button class="nav-btn" id="navMenuBtn">Menu</button>
    </nav>

    <div class="menu-overlay" id="menuOverlay">
      <button class="close-menu" id="closeMenu">&times;</button>

      <div class="menu-container">
        <nav class="menu-links">
          <a href="#" data-section="family">Family</a>
          <a href="#" data-section="friends">Friends</a>
          <div class="nested-trigger">
            <a href="#" data-section="activity" id="activityTrigger"
              >Activity <span>&rarr;</span></a
            >
            <div class="sub-menu" id="activitySubMenu">
              <a href="#" data-section="prelim">Prelim</a>
              <a href="#" data-section="midterm">Midterm</a>
              <a href="#" data-section="prefinal">Prefinal</a>
              <a href="#" data-section="final">Final</a>
            </div>
          </div>
          <a href="#" data-section="gala">Gala Galore</a>
        </nav>

        <div class="menu-visuals">
          <div class="photo-carousel active" id="carousel-family">
            <div class="photo-track">
              <img
                src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=800"
                alt="Family"
              /><img
                src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=800"
                alt="Family"
              />
            </div>
          </div>
          <div class="photo-carousel" id="carousel-friends">
            <div class="photo-track">
              <img
                src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800"
                alt="Friends"
              /><img
                src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800"
                alt="Friends"
              />
            </div>
          </div>
          <div class="photo-carousel" id="carousel-activity">
            <div class="photo-track">
              <img
                src="https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?w=800"
                alt="Activity"
              /><img
                src="https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?w=800"
                alt="Activity"
              />
            </div>
          </div>

          <div class="photo-carousel" id="carousel-prelim">
            <div class="photo-track">
              <img src="images/prelim1.jpg" alt="Prelim" /><img
                src="images/prelim1.jpg"
                alt="Prelim"
              />
            </div>
          </div>
          <div class="photo-carousel" id="carousel-midterm">
            <div class="photo-track">
              <img src="images/midterm1.jpg" alt="Midterm" /><img
                src="images/midterm1.jpg"
                alt="Midterm"
              />
            </div>
          </div>
          <div class="photo-carousel" id="carousel-prefinal">
            <div class="photo-track">
              <img src="images/prefinal1.jpg" alt="Prefinal" /><img
                src="images/prefinal1.jpg"
                alt="Prefinal"
              />
            </div>
          </div>
          <div class="photo-carousel" id="carousel-final">
            <div class="photo-track">
              <img src="images/final1.jpg" alt="Final" /><img
                src="images/final1.jpg"
                alt="Final"
              />
            </div>
          </div>

          <div class="photo-carousel" id="carousel-gala">
            <div class="photo-track">
              <img
                src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800"
                alt="Gala"
              /><img
                src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800"
                alt="Gala"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-container">
      <div class="left-side fade-in-down" style="animation-delay: 0.1s">
        <img
          src="images/MyPicture.jpg"
          alt="Will Diether Arinsol"
          class="profile-img"
        />
      </div>
      <div class="right-side">
        <div class="content-wrapper">
          <div
            class="accent-line fade-in-down"
            style="animation-delay: 0.2s"
          ></div>
          <h1 class="fade-in-down" style="animation-delay: 0.3s">
            Meet <br /><span>Will Diether Arinsol</span>
          </h1>
          <button
            class="learn-more-btn fade-in-down"
            id="openMenu"
            style="animation-delay: 0.4s"
          >
            Learn More
          </button>
          <div
            class="carousel-section fade-in-down"
            style="animation-delay: 0.5s"
          >
            <span class="carousel-label">Development Stack</span>
            <div class="carousel-wrapper">
              <div class="carousel-track">
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/python/3776AB"
                    alt="Python"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/html5/E34F26"
                    alt="HTML5"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/mysql/4479A1"
                    alt="MySQL"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/javascript/F7DF1E"
                    alt="JS"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/css3/1572B6"
                    alt="CSS3"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/python/3776AB"
                    alt="Python"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/html5/E34F26"
                    alt="HTML5"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/mysql/4479A1"
                    alt="MySQL"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/javascript/F7DF1E"
                    alt="JS"
                  />
                </div>
                <div class="skill-item">
                  <img
                    src="https://cdn.simpleicons.org/css3/1572B6"
                    alt="CSS3"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
